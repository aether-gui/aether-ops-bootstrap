schema_version: 1

site:
  title: Aether Ops Bootstrap Downloads
  base_url_path: /aether-ops-bootstrap
  description: Public download page for the bootstrap launcher and offline bundle artifacts.

releases:
  - id: "2026-04-21-example"
    published_at: "2026-04-21"
    current: true

    bootstrap:
      label: Bootstrap Launcher
      version: "0.1.43"
      path: "0.1.43"
      filename: aether-ops-bootstrap
      source: ../dist/aether-ops-bootstrap
      commit: "341787b"
      # release_summary is the one- or two-sentence headline shown
      # above the bullet list. Optional but recommended — without it
      # the card renders only the bullet list (collapsed by default).
      release_summary: >-
        Replace this with a one- or two-sentence summary of the launcher change.
      # release_notes is a YAML sequence — each entry renders as a
      # bullet point under the "Show change details" disclosure on the
      # download page. Wrap long bullets across multiple physical
      # lines if needed (YAML folds them) or split into multiple
      # bullets.
      release_notes:
        - Replace this with a launcher-specific note for the release.

    bundle:
      label: Offline Bundle
      version: "2026.04.1"
      path: "2026.04.1"
      filename: bundle.tar.zst
      source: ../dist/bundle.tar.zst
      sha256_source: ../dist/bundle.tar.zst.sha256
      build_commit: "341787b"
      release_summary: >-
        Replace this with a one- or two-sentence summary of the bundle change.
      release_notes:
        - Replace this with a bundle-specific note for the release.
      # Bundled components rendered as a list under the bundle card.
      # Each entry is free-form: provide whichever of version/commit
      # are meaningful. Long commit hashes are auto-shortened to 7 chars.
      components:
        - name: aether-ops
          version: v0.1.49
        - name: aether-onramp
          commit: eb0b89bdeb00342deab732b73c0187175a0a7265
        - name: rke2
          version: v1.33.1+rke2r1
        - name: helm
          version: v3.17.3
        - name: sdcore-helm-charts
          version: main

  # External entries reference artifacts that already exist on the live
  # site. They contribute to metadata.json and the release history page
  # without re-copying source files. Use this to retain prior releases
  # across regenerations without holding old (often multi-GB) artifacts
  # locally. `external` requires `sha256` on each artifact (since there
  # is no source to compute it from); `path` is still used to construct
  # the URL into the existing tree.
  - id: "2026-04-21-legacy-example"
    published_at: "2026-04-21"
    external: true
    bootstrap:
      label: Bootstrap Launcher
      version: "75229ab"
      path: "75229ab"
      filename: aether-ops-bootstrap
      sha256: "e090bf6561696063d002ddff2316101b7206b52b80748a16d929d1e872de3b1c"
      commit: "75229ab"
    bundle:
      label: Offline Bundle
      version: "0.0.0-dev"
      path: "0.0.0-dev-2760b8f"
      filename: bundle.tar.zst
      sha256: "80b576b97efacc7ea87c17747b90bfc0bc9d82c5cd9cb6ba897a0e29d06f6aa4"
      build_commit: "2760b8f"
