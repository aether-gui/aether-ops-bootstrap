schema_version: 1
site:
  title: Aether Ops Bootstrap Downloads
  base_url_path: /aether-ops-bootstrap
  description: Public download page for the bootstrap launcher, offline bundle, and bundle patch tool.
  # artifact_kinds carries static metadata about each artifact type:
  # what it is and where to find docs. Per-release entries inherit
  # description and docs_url from the matching kind so blurbs stay
  # consistent across releases.
  artifact_kinds:
    bootstrap:
      label: Bootstrap Launcher
      description: >-
        One-shot offline installer for the Aether platform layer. Reads an offline bundle and brings up RKE2, aether-ops, and the prerequisites on a freshly installed Ubuntu Server host without touching the network.
      docs_url: https://aether-gui.github.io/docs/tools/aether-ops-bootstrap
    bundle:
      label: Offline Bundle
      description: >-
        Opaque tarball containing every artifact the launcher needs to bring a host up offline — `.deb` packages, RKE2, Helm, aether-ops, the aether-onramp toolchain, container images, and a manifest pinning every file's SHA256.
      docs_url: https://aether-gui.github.io/docs/concepts/bundle-structure
    patch_tool:
      label: Bundle Patch Tool
      description: >-
        Rewrites files inside an existing bundle without re-running a full build — fast path for swapping aether-onramp configuration templates (SDR parameters, ZMQ ports, SD-Core values) without re-pulling images or APT packages.
      docs_url: https://aether-gui.github.io/docs/tools/patch-bundle
releases:
  - id: "2026-06-01-bundle-inspect"
    published_at: "2026-06-01T20:00:00Z"
    current: true
    bootstrap:
      version: "2026.06.01.1"
      path: "2026.06.01.1"
      filename: aether-ops-bootstrap
      source: ../dist/aether-ops-bootstrap
      commit: "1e10a70"
      release_summary: >-
        Launcher v0.3.0 ships the new `inspect` subcommand plus the additive manifest provenance schema (AetherOpsSource, OnrampEntry.Patches). Bundle is rebuilt against aether-onramp v2.3.0 and sdcore-helm-charts v4.0.0 with airgap fixes for the onramp helm-version mismatch and the missing ocudu preflight image.
      release_notes:
        - "`aether-ops-bootstrap inspect --bundle <path>` streams the in-bundle manifest from a tar.zst and pretty-prints version, build provenance, component pins, applied patches, and outer-archive integrity. `--json` re-emits the parsed manifest."
        - Manifest schema additions are omitempty / no schema bump — older v2 bundles still parse and render with em-dash placeholders. AetherOpsEntry.Source records release/source/local provenance; OnrampEntry.Patches logs builtin / user / post-build patches with timestamps and SHA256.
        - patch-bundle appends post-build PatchRecord entries to the manifest on each invocation.
      security_artifacts:
        - kind: sbom
          filename: aether-ops-bootstrap.spdx.json
          source: ../dist/sbom-bootstrap.spdx.json
        - kind: grype
          filename: aether-ops-bootstrap.grype.json
          source: ../dist/grype-bootstrap.json
        - kind: grype-table
          filename: aether-ops-bootstrap.grype.txt
          source: ../dist/grype-bootstrap.txt
        - kind: vex
          filename: openvex.json
          source: ../security/vex/openvex.json
    bundle:
      version: "2026.06.01.1"
      path: "2026.06.01.1"
      filename: bundle.tar.zst
      source: ../dist/bundle.tar.zst
      sha256_source: ../dist/bundle.tar.zst.sha256
      build_commit: "1e10a70"
      release_summary: >-
        aether-ops bumped to v0.2.3, aether-onramp pinned to the v2.3.0 release tag, sdcore-helm-charts pinned to v4.0.0, helm bumped to v3.21.0. Bundle now stamps k8s.helm.version into onramp's vars/main.yml at build time and ships ghcr.io/omec-project/pod-init:rel-1.2.2 so the ocudu gNB preflight passes in airgap.
      release_notes:
        - aether-ops daemon bumped to v0.2.3.
        - aether-onramp pinned to the v2.3.0 release tag (was the 78f75c6a commit on main).
        - sdcore-helm-charts pinned to v4.0.0 (was tracking main).
        - "helm bumped from v3.20.0 to v3.21.0; build-bundle now patches onramp's `vars/main.yml` `k8s.helm.version` key to match the bundled helm so the onramp k8s/helm role does not try to fetch get-helm.sh from raw.githubusercontent.com on a version mismatch."
        - Bundled `ghcr.io/omec-project/pod-init:rel-1.2.2` (the ocudu gNB / uEsimulator preflight probe image) so the `docker run --rm pod-init nproc` check passes airgapped.
        - Deb pins refreshed from latest noble-updates — containerd 2.2.3 → 2.2.4, docker-ce 29.5.1 → 29.5.2, docker-buildx 0.34.0 → 0.34.1, docker-compose 5.1.3 → 5.1.4, plus assorted point releases.
      components:
        - name: aether-ops
          version: v0.2.3
        - name: aether-onramp
          version: v2.3.0
        - name: rke2
          version: v1.35.3+rke2r3
        - name: helm
          version: v3.21.0
        - name: sdcore-helm-charts
          version: v4.0.0
      security_artifacts:
        - kind: sbom
          filename: bundle.spdx.json
          source: ../dist/sbom-bundle.spdx.json
        - kind: grype
          filename: bundle.grype.json
          source: ../dist/grype-bundle.json
        - kind: grype-table
          filename: bundle.grype.txt
          source: ../dist/grype-bundle.txt
        - kind: image-sboms
          filename: image-sboms.tar.gz
          source: ../dist/image-sboms.tar.gz
        - kind: image-grypes
          filename: image-grypes.tar.gz
          source: ../dist/image-grypes.tar.gz
        - kind: vex
          filename: openvex.json
          source: ../security/vex/openvex.json
    patch_tool:
      version: "2026.06.01.1"
      path: "2026.06.01.1"
      filename: patch-bundle
      source: ../dist/patch-bundle
      build_commit: "1e10a70"
      release_summary: >-
        Rebuilt alongside the 2026.06.01.1 launcher and bundle. Now appends `post-build` PatchRecord entries (kind, target, applier, timestamp, SHA256) to the manifest on each invocation, so inspect can surface every patch ever applied to a bundle.
      release_notes:
        - Rebuilt alongside the 2026.06.01.1 launcher and bundle.
        - Each `patch-bundle` invocation now appends a `post-build` PatchRecord per applied patch into `manifest.components.onramp.patches`, with kind, target, applier, source description, RFC3339 timestamp, and post-patch SHA256.
