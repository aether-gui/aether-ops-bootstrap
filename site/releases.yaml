schema_version: 1

site:
  title: Aether Ops Bootstrap Downloads
  base_url_path: /aether-ops-bootstrap
  description: Public download page for the bootstrap launcher and offline bundle artifacts.

releases:
  - id: "2026-04-29-dynamic-discovery-ocudu"
    published_at: "2026-04-29"
    current: true

    bootstrap:
      label: Bootstrap Launcher
      version: "2026.04.29.1"
      path: "2026.04.29.1"
      filename: aether-ops-bootstrap
      source: ../dist/aether-ops-bootstrap
      commit: "ec4d6b8"
      release_notes: |
        Bootstrap rebuilt to pair with the 2026.04.29.1 offline bundle.
        Inherits the dynamic component discovery and ocudu support
        introduced by aether-ops v0.1.48-11.

    bundle:
      label: Offline Bundle
      version: "2026.04.29.1"
      path: "2026.04.29.1"
      filename: bundle.tar.zst
      source: ../dist/bundle.tar.zst
      sha256_source: ../dist/bundle.tar.zst.sha256
      build_commit: "ec4d6b8"
      release_notes: |
        Bundle rebuilt with aether-ops v0.1.48-11, which migrates internal
        component discovery to a dynamic scheme and adds support for ocudu
        (O-CU/O-DU) workloads. aether-onramp is pinned to
        bengrewell/aether-onramp at 7aad6b9.
      components:
        - name: aether-ops
          version: v0.1.48-11
        - name: aether-onramp
          commit: 7aad6b908c82f1631081224a870bea96bf43db6d
        - name: rke2
          version: v1.33.1+rke2r1
        - name: helm
          version: v3.17.3
        - name: sdcore-helm-charts
          version: main

