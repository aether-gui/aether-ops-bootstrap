schema_version: 1

site:
  title: Aether Ops Bootstrap Downloads
  base_url_path: /aether-ops-bootstrap
  description: Public download page for the bootstrap launcher, offline bundle, and bundle patch tool.
  # artifact_kinds carries static metadata about each artifact type:
  # what it is and where to find docs. Per-release entries inherit
  # description and docs_url from the matching kind so blurbs stay
  # consistent across releases.
  artifact_kinds:
    bootstrap:
      label: Bootstrap Launcher
      description: >-
        One-shot offline installer for the Aether platform layer. Reads an
        offline bundle and brings up RKE2, aether-ops, and the prerequisites
        on a freshly installed Ubuntu Server host without touching the
        network.
      docs_url: https://aether-gui.github.io/docs/tools/aether-ops-bootstrap
    bundle:
      label: Offline Bundle
      description: >-
        Opaque tarball containing every artifact the launcher needs to bring
        a host up offline — `.deb` packages, RKE2, Helm, aether-ops, the
        aether-onramp toolchain, container images, and a manifest pinning
        every file's SHA256.
      docs_url: https://aether-gui.github.io/docs/concepts/bundle-structure
    patch_tool:
      label: Bundle Patch Tool
      description: >-
        Rewrites files inside an existing bundle without re-running a full
        build — fast path for swapping aether-onramp configuration templates
        (SDR parameters, ZMQ ports, SD-Core values) without re-pulling images
        or APT packages.
      docs_url: https://aether-gui.github.io/docs/tools/patch-bundle

releases:
  - id: "2026-05-07-onramp-usb-bind-mount"
    published_at: "2026-05-08T01:30:00Z"
    current: true

    bootstrap:
      version: "2026.05.07.2"
      path: "2026.05.07.2"
      filename: aether-ops-bootstrap
      source: ../dist/aether-ops-bootstrap
      commit: "8669678"
      release_notes: |
        Bootstrap unchanged from 2026.05.07.1 source-wise; rebuilt
        to ship alongside the new bundle. Same apt-repo airgap
        install pipeline (apt-get install against
        /var/lib/aether-ops/apt-repo, with the persistent
        /etc/apt/sources.list.d/aether-bundle.list entry for
        post-bootstrap operator-driven `apt install`).

    bundle:
      version: "2026.05.07.2"
      path: "2026.05.07.2"
      filename: bundle.tar.zst
      source: ../dist/bundle.tar.zst
      sha256_source: ../dist/bundle.tar.zst.sha256
      build_commit: "8669678"
      release_notes: |
        Bundle rebuilt to re-pin aether-onramp at upstream 78f75c6a
        (current HEAD of opennetworkinglab/aether-onramp main),
        picking up PR #213 — ocudu/gNB now bind-mounts /dev/bus/usb
        into the gNB docker container for USRP hot-plug visibility.
        This is the upstream root-cause fix for the USRP USB access
        symptom the local udev workaround in 2026.05.06.1 papered
        over: with the bind-mount, libusb inside the container can
        see the host's USB tree and any hot-plug device-add events
        regardless of the host-side udev MODE on the device node.
        aether-ops v0.1.50, rke2 v1.35.3+rke2r3, helm v3.20.0
        unchanged.
      components:
        - name: aether-ops
          version: v0.1.50
        - name: aether-onramp
          commit: 78f75c6a415c2e8567cd8c976a322e8be3d33da2
        - name: rke2
          version: v1.35.3+rke2r3
        - name: helm
          version: v3.20.0
        - name: sdcore-helm-charts
          version: main

    patch_tool:
      version: "2026.05.07.2"
      path: "2026.05.07.2"
      filename: patch-bundle
      source: ../dist/patch-bundle
      build_commit: "8669678"
      release_notes: |
        Patch tool rebuilt alongside the 2026.05.07.2 launcher and
        bundle. No functional changes.

  - id: "2026-05-07-apt-repo-airgap-install"
    published_at: "2026-05-07T21:45:00Z"
    external: true

    bootstrap:
      version: "2026.05.07.1"
      path: "2026.05.07.1"
      filename: aether-ops-bootstrap
      sha256: "f8b5c9cca0b8a2e27f41f1205a452c8cbb38832203c8365a8ade58845959b49f"
      commit: "9b2c821"
      release_notes: |
        Bootstrap rebuilt with the airgap deb install path migrated
        from `dpkg -i --force-*` over a curated subset to `apt-get
        install` against a self-contained file:// apt repository
        shipped inside the bundle. The launcher stages the bundle's
        apt-repo/ persistently at /var/lib/aether-ops/apt-repo and
        drops a sources.list at /etc/apt/sources.list.d/aether-bundle.list
        so post-bootstrap operator-driven `apt install` works for
        anything the bundle shipped. Apt now owns dependency
        resolution, conflict handling (ufw vs iptables-persistent
        resolves cleanly), and dpkg's trigger orchestration —
        `apt-get check` returns clean and `dpkg --audit` is empty
        after install, fixing the broken-state symptom that the
        2026.05.06.1 udev component was working around. Bundle
        manifest schema bumped to v2; old launchers refuse new
        bundles and vice-versa.

    bundle:
      version: "2026.05.07.1"
      path: "2026.05.07.1"
      filename: bundle.tar.zst
      sha256: "7e2d9af11fd85c7f000a51cb472ace22fe63a2dc96f634d033e23ed6df09e6ad"
      build_commit: "9b2c821"
      release_notes: |
        Bundle rebuilt with the apt-repo layout. apt-repo/dists/noble/
        ships Release + per-arch Packages/Packages.gz with full
        upstream control fields preserved (Breaks/Conflicts/Replaces
        survive verbatim); apt-repo/pool/noble/{amd64,all}/ holds the
        262 .deb files. Resolver no longer skips Essential /
        Priority: required packages so apt has the closure it needs
        to upgrade image-baked copies for strict-version Depends
        edges (227 → 262 debs). aether-onramp pinned at upstream
        11a34c9 (no change from 2026.05.06.1); aether-ops v0.1.50,
        rke2 v1.35.3+rke2r3, helm v3.20.0 unchanged.
      components:
        - name: aether-ops
          version: v0.1.50
        - name: aether-onramp
          commit: 11a34c9675da7c58de08e31fe54e4e098c402ff2
        - name: rke2
          version: v1.35.3+rke2r3
        - name: helm
          version: v3.20.0
        - name: sdcore-helm-charts
          version: main

    patch_tool:
      version: "2026.05.07.1"
      path: "2026.05.07.1"
      filename: patch-bundle
      sha256: "acabb78a9234f1ee58cb965c20f05fc7cac7553a07f3c0d5566725b889a18f84"
      build_commit: "9b2c821"
      release_notes: |
        Patch tool rebuilt alongside the 2026.05.07.1 launcher and
        bundle. No functional changes.

  - id: "2026-05-06-udev-onramp-airgap-cache"
    published_at: "2026-05-06T22:45:00Z"
    external: true

    bootstrap:
      version: "2026.05.06.1"
      path: "2026.05.06.1"
      filename: aether-ops-bootstrap
      sha256: "34fb10e6fcd4e89ee41c5f48ceae3dc3bb2ea996c1771aff0daefe38e6e6d7f1"
      commit: "73c0703"
      release_notes: |
        Bootstrap rebuilt with a new udev component that installs
        rule drop-ins from templates/udev.rules.d/ into
        /etc/udev/rules.d and runs `udevadm control --reload-rules`
        followed by `udevadm trigger`. Ships uhd-usrp.rules so USRP
        B200/B210, USRP1, and B100 USB nodes come up world-writable
        and the onramp/aether service account can open them; without
        this, onramp's gNB role fails to acquire the radio after a
        fresh install. The component is registered after
        service_account in the launcher and added to the RAN role's
        component set.

    bundle:
      version: "2026.05.06.1"
      path: "2026.05.06.1"
      filename: bundle.tar.zst
      sha256: "653ca47b51b9ccb22e6cb2062c8829a905aa94b6b6e1339964ca9db756b0fa39"
      build_commit: "73c0703"
      release_notes: |
        Bundle rebuilt to re-pin aether-onramp at upstream
        11a34c9 (current HEAD of opennetworkinglab/aether-onramp
        main). Picks up upstream PR #210's airgap cache protection:
        the new airgapped.allow_purge flag preserves cached
        container images and bundled rke2/helm binaries across
        stop/uninstall in airgap mode, docker-driven roles consume
        locally-staged images instead of pulling, and network-only
        install steps in ueransim, oscric, amp/roc, and amp/monitor
        gate on airgapped.enabled. aether-ops v0.1.50, rke2
        v1.35.3+rke2r3, and helm v3.20.0 are unchanged from
        2026.05.05.5. Lockfile refreshed: docker-ce roll forward
        to 5:29.4.3-1.
      components:
        - name: aether-ops
          version: v0.1.50
        - name: aether-onramp
          commit: 11a34c9675da7c58de08e31fe54e4e098c402ff2
        - name: rke2
          version: v1.35.3+rke2r3
        - name: helm
          version: v3.20.0
        - name: sdcore-helm-charts
          version: main

    patch_tool:
      version: "2026.05.06.1"
      path: "2026.05.06.1"
      filename: patch-bundle
      sha256: "aa8a19d5cc3009bada8d035638521bf22d62a72ae1d50b3663b8e71656168d2a"
      build_commit: "73c0703"
      release_notes: |
        Patch tool rebuilt alongside the 2026.05.06.1 launcher and
        bundle. No functional changes.

  - id: "2026-05-05-airgap-bringup-hardening"
    published_at: "2026-05-05T23:23:22Z"
    external: true

    bootstrap:
      version: "2026.05.05.5"
      path: "2026.05.05.5"
      filename: aether-ops-bootstrap
      sha256: "0be6d230b1b8b9aa1a3ce822553b96ccdc8b9dfdfa0459882c0e22ecf75049ab"
      commit: "141c4d8"
      release_notes: |
        Bootstrap rebuilt with airgap bring-up fixes uncovered during
        gNB lab deployment. Adds a new dockerimages install step that
        loads the bundle's container image tarballs into Docker's
        image store after rke2 stages them into containerd, so OnRamp
        roles that drive Docker directly (ocudu, gnbsim, oai, srsran,
        n3iwf, oscric, plus the gNB Docker preflight) see the
        pre-pulled images. The debs install step now skips packages
        already on the host (queried via dpkg-query) to avoid the
        half-upgrade ABI skew that wedged apt for future installs.
        Bundle resolver groups noble / noble-updates / noble-security
        as one merged index per arch so transitive system libs match
        the host's point release.

    bundle:
      version: "2026.05.05.5"
      path: "2026.05.05.5"
      filename: bundle.tar.zst
      sha256: "b69fdeca820fde60353c19b4dd0b78ee938fc8c543e526d7d8169c48764bd469"
      build_commit: "141c4d8"
      release_notes: |
        Bundle rebuilt with the airgap-aligned versions OnRamp's
        vars/main.yml expects: rke2 bumped to v1.35.3+rke2r3, helm to
        v3.20.0. Ubuntu suite list now spans noble + noble-updates +
        noble-security so transitive system libs resolve at the host
        image's current point release. Image scanner gained
        umbrella-aware partial resolution (Bitnami's bitnamilegacy
        rename: umbrella overrides repository, subchart supplies
        tag) and explicit images.extra entries for the bitnamilegacy
        mongodb / kafka pair plus aetherproject/ocudu and
        aetherproject/srsran-ue (latter two until the OnRamp role
        scanner exists). aether-onramp pinned at fd2037f1d8 (no
        change from 2026.05.05.2).
      components:
        - name: aether-ops
          version: v0.1.50
        - name: aether-onramp
          commit: fd2037f1d89120ffcb0eab0e28e620fb8ca4882d
        - name: rke2
          version: v1.35.3+rke2r3
        - name: helm
          version: v3.20.0
        - name: sdcore-helm-charts
          version: main

    patch_tool:
      version: "2026.05.05.5"
      path: "2026.05.05.5"
      filename: patch-bundle
      sha256: "88e0d79e8fd626fdb49421ddd5fc621a219627743a2b83c37e8a7b2a23b390e1"
      build_commit: "141c4d8"
      release_notes: |
        Patch tool rebuilt alongside the 2026.05.05.5 launcher and
        bundle. No functional changes; tooling only ships current
        with the rest of the release artifacts.

