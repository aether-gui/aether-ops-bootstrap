      commit: "90eda9b"
      release_notes: |
        Bootstrap rebuilt with the RKE2 onramp-config parity changes
        from aether-ops-bootstrap#32. Adds the kubelet
        `--allowed-unsafe-sysctls=net.*` and kube-apiserver
        `--service-node-port-range=2000-36767` args sd-core depends
        on, plus the kube-proxy metrics bind, explicit pod/service
        CIDRs, cluster token, and node-name fields onramp's k8s role
        would otherwise have applied. Drops a
        `/etc/sysctl.d/90-aether-ops.conf` with `fs.file-max` and the
        `fs.inotify.*` limits and runs `sysctl --system` before
        rke2-server starts so kubelet boots under the tuned limits.
        Pairs with the 2026.05.05.1 offline bundle.

    bundle:
