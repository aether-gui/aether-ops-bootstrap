schema_version: 1
bundle_version: "0.0.0-dev"

ubuntu:
  suites: [noble]
  architectures: [amd64]

# Top-level packages to vendor. The builder resolves transitive
# dependencies automatically per (suite, arch) pair.
debs:
  - name: ansible
  - name: git
  - name: make
  - name: curl
  - name: jq
  - name: ssh
  - name: sshpass
  - name: iptables

rke2:
  version: "v1.33.1+rke2r1"
  variants: [canal]
  # "all-in-one": single rke2-images tarball per arch (includes default canal CNI)
  # "core+variant": rke2-images-core + per-variant image tarball
  image_mode: all-in-one
  # source: https://github.com/rancher/rke2/releases/download
  #   ↑ optional override; defaults to GitHub releases

helm:
  version: "v3.17.3"

aether_ops:
  version: "v0.1.41"
  source: ./dist/aether-ops_0.1.41-SNAPSHOT-7e90160_linux_amd64.tar.gz  # local pre-built binary
  # ref: "main"           # build from source at this git ref (mutually exclusive with source)
  # repo: aether-gui/aether-ops
  # frontend_ref: ""     # override frontend submodule (source build only)
  # onramp_user: aether  # OS user for Ansible SSH deployments (default: aether)
  # onramp_password not shown here — provide at runtime, not in checked-in specs

templates_dir: ./templates
