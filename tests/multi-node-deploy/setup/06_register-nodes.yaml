- name: register core-vm as master+worker
  node: mgmt-vm
  step:
    type: execute
    options:
      command: |
        curl -sf -X POST http://localhost:8186/api/v1/nodes \
          -H 'Authorization: Bearer test-token-e2e' \
          -H 'Content-Type: application/json' \
          -d '{
            "name": "core",
            "ansible_host": "10.200.4.11",
            "ansible_user": "aether-ops",
            "password": "aether",
            "sudo_password": "aether",
            "roles": ["master", "worker"]
          }' | jq -e '.id != ""'

- name: register gnb-vm as srsran
  node: mgmt-vm
  step:
    type: execute
    options:
      command: |
        curl -sf -X POST http://localhost:8186/api/v1/nodes \
          -H 'Authorization: Bearer test-token-e2e' \
          -H 'Content-Type: application/json' \
          -d '{
            "name": "gnb",
            "ansible_host": "10.200.4.12",
            "ansible_user": "aether-ops",
            "password": "aether",
            "sudo_password": "aether",
            "roles": ["srsran"]
          }' | jq -e '.id != ""'

- name: sync inventory
  node: mgmt-vm
  step:
    type: execute
    options:
      command: |
        curl -sf -X POST http://localhost:8186/api/v1/onramp/inventory/sync \
          -H 'Authorization: Bearer test-token-e2e' | jq .

# aether-onramp's vars/main.yml ships with core.data_iface=ens18, which
# does not exist on LXD VMs. Apply config defaults so data_iface and
# other role-derived fields are rewritten from each registered node's
# facts (default route interface / primary IP) into vars/main.yml.
- name: apply config defaults from node facts
  node: mgmt-vm
  step:
    type: execute
    options:
      command: |
        curl -sf -X POST http://localhost:8186/api/v1/onramp/config/defaults \
          -H 'Authorization: Bearer test-token-e2e' | jq .
