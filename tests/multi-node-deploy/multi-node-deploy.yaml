---
suite: Multi-Node Full Deployment (Airgapped)

lxd:
  networks:
    - name: mn-deploy-net
      type: bridge
      subnet: 10.200.4.0/24
      gateway: 10.200.4.1

  profiles:
    - name: mn-deploy-mgmt
      description: Management node (2 CPU, 4GB RAM, 50GB disk)
      devices:
        root:
          type: disk
          path: /
          pool: default
          size: 50GB
      config:
        limits.cpu: "2"
        limits.memory: "4GB"
        user.user-data: &cloud-init |
          #cloud-config
          users:
            - name: aether
              groups: [sudo]
              shell: /bin/bash
              lock_passwd: false
              passwd: "$6$rounds=4096$salt$JDZz0k9OIkMfDGNfPMlCvPqvH9yOjVVJ8aGm6Bra/G1S5drVYJJDQo6.aNHJ3cWWM4BDNmJi5Juf96FZDvtS."
              sudo: ALL=(ALL) NOPASSWD:ALL
          ssh_pwauth: true
          runcmd:
            - [ bash, -c, "sed -i 's/^#PasswordAuthentication.*/PasswordAuthentication yes/; s/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config" ]
            - [ rm, -f, /etc/ssh/sshd_config.d/60-cloudimg-settings.conf ]
            - [ systemctl, restart, ssh ]
            - [ touch, /tmp/cloud-init.complete ]

    - name: mn-deploy-core
      description: SD-Core node (8 CPU, 16GB RAM, 100GB disk)
      devices:
        root:
          type: disk
          path: /
          pool: default
          size: 100GB
      config:
        limits.cpu: "8"
        limits.memory: "16GB"
        user.user-data: *cloud-init

    - name: mn-deploy-gnb
      description: gNB/RAN node (4 CPU, 8GB RAM, 50GB disk)
      devices:
        root:
          type: disk
          path: /
          pool: default
          size: 50GB
      config:
        limits.cpu: "4"
        limits.memory: "8GB"
        user.user-data: *cloud-init

nodes: !!load_from(nodes)
setup: !!load_from(setup)
tests: !!load_from(tests)
teardown: !!load_from(teardown)
