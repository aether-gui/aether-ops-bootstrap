---
suite: Single Node Full Deployment (Airgapped)

lxd:
  networks:
    - name: sn-deploy-net
      type: bridge
      subnet: 10.200.2.0/24
      gateway: 10.200.2.1

  profiles:
    - name: sn-deploy-profile
      description: Single-node deploy VM (8 CPU, 16GB RAM, 100GB disk)
      devices:
        root:
          type: disk
          path: /
          pool: default
          opts:
            size: 100GB
      config:
        limits.cpu: "8"
        limits.memory: "16GB"
        user.user-data: |
          #cloud-config
          # The aether service account is created by aether-ops-bootstrap with
          # the password it registers ("aether"). Declaring the user here with
          # a different passwd hash would win and break ansible SSH auth
          # because createOnrampUser skips chpasswd when the user already
          # exists. ssh_pwauth and the sshd runcmds only toggle password
          # authentication globally; they don't depend on a user block.
          ssh_pwauth: true
          runcmd:
            - [ bash, -c, "sed -i 's/^#PasswordAuthentication.*/PasswordAuthentication yes/; s/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config" ]
            - [ rm, -f, /etc/ssh/sshd_config.d/60-cloudimg-settings.conf ]
            - [ systemctl, restart, ssh ]
            - [ touch, /tmp/cloud-init.complete ]

nodes: !!load_from(nodes)
setup: !!load_from(setup)
tests: !!load_from(tests)
teardown: !!load_from(teardown)
