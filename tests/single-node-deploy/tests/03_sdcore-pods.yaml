- name: verify SD-Core pods reach Running state
  node: sn-vm
  type: execute
  options:
    # Poll up to 15 minutes for at least one Running pod in the
    # aether-5gc namespace. Helm returns as soon as resources are
    # created; pods then race through image-loading (even when the
    # images are pre-staged in containerd) and init containers. Dump
    # pod state every 60s so a stalled deploy produces actionable
    # diagnostics rather than an empty failure.
    command: |
      export KUBECONFIG=/etc/rancher/rke2/rke2.yaml
      KUBECTL=/var/lib/rancher/rke2/bin/kubectl
      for i in $(seq 1 90); do
        RUNNING=$($KUBECTL get pods -n aether-5gc --no-headers 2>/dev/null | grep -c Running || true)
        if [ "$RUNNING" -gt 0 ]; then
          echo "running pods in aether-5gc namespace: $RUNNING"
          $KUBECTL get pods -n aether-5gc
          exit 0
        fi
        if [ $((i % 6)) -eq 0 ]; then
          echo "--- progress at $((i*10))s ---"
          $KUBECTL get pods -A 2>&1 || true
        fi
        sleep 10
      done
      echo "no running pods in aether-5gc after 900s"
      echo "--- final pod state ---"
      $KUBECTL get pods -A 2>&1 || true
      echo "--- recent events in aether-5gc ---"
      $KUBECTL get events -n aether-5gc --sort-by=.lastTimestamp 2>&1 | tail -40 || true
      exit 1
    evaluate:
      exit_code: 0
      contains: "running pods in aether-5gc namespace:"

- name: list all pods for diagnostic visibility
  node: sn-vm
  type: execute
  options:
    command: |
      export KUBECONFIG=/etc/rancher/rke2/rke2.yaml
      /var/lib/rancher/rke2/bin/kubectl get pods -A
    evaluate:
      exit_code: 0
