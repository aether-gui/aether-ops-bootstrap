- name: register localhost as single-node (master+worker)
  node: sn-vm
  step:
    type: execute
    options:
      command: |
        curl -sf -X POST http://localhost:8186/api/v1/nodes \
          -H 'Authorization: Bearer test-token-e2e' \
          -H 'Content-Type: application/json' \
          -d '{
            "name": "localhost",
            "ansible_host": "127.0.0.1",
            "ansible_user": "aether-ops",
            "password": "aether",
            "sudo_password": "aether",
            "roles": ["master", "worker"]
          }' | jq -e '.id != ""'

# aether-ops's UI calls POST /api/v1/onramp/config/defaults before
# triggering a deploy; the test mirrors that flow. The configdefaults
# provider gathers facts from each registered node and rewrites
# core.data_iface (and other role-derived fields) into the top-level
# vars/main.yml that the onramp playbooks load. This is the path the
# operator workflow actually uses, so it is the one we exercise.
- name: apply config defaults from node facts
  node: sn-vm
  step:
    type: execute
    options:
      command: |
        curl -sf -X POST http://localhost:8186/api/v1/onramp/config/defaults \
          -H 'Authorization: Bearer test-token-e2e' | jq .
