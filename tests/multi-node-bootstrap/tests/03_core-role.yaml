- name: verify core has RKE2 running
  node: core-vm
  type: execute
  options:
    command: systemctl is-active rke2-server
    evaluate:
      exit_code: 0
      match: "active"

- name: verify core has kubectl reporting Ready
  node: core-vm
  type: execute
  options:
    command: |
      export KUBECONFIG=/etc/rancher/rke2/rke2.yaml
      /var/lib/rancher/rke2/bin/kubectl get nodes --no-headers
    evaluate:
      exit_code: 0
      contains: "Ready"

- name: verify core has helm installed
  node: core-vm
  type: execute
  options:
    command: /usr/local/bin/helm version --short
    evaluate:
      exit_code: 0
      contains: "v3"

- name: verify core does NOT have aether-ops
  node: core-vm
  type: execute
  options:
    command: "! systemctl is-active aether-ops 2>/dev/null && echo 'no aether-ops on core'"
    evaluate:
      exit_code: 0
      contains: "no aether-ops on core"

- name: verify core has container images loaded
  node: core-vm
  type: execute
  options:
    command: |
      COUNT=$(/var/lib/rancher/rke2/bin/crictl --runtime-endpoint unix:///run/k3s/containerd/containerd.sock images 2>/dev/null | grep -c omec)
      echo "omec images: $COUNT"
      [ "$COUNT" -gt 0 ]
    evaluate:
      exit_code: 0
      contains: "omec images:"

- name: verify core state records core role
  node: core-vm
  type: execute
  options:
    command: cat /var/lib/aether-ops-bootstrap/state.json | jq -r '.roles[]'
    evaluate:
      exit_code: 0
      match: "core"
