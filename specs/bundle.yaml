schema_version: 1
bundle_version: "0.0.0-dev"

ubuntu:
  suites: [noble]
  architectures: [amd64]

# Top-level packages to vendor. The builder resolves transitive
# dependencies automatically per (suite, arch) pair.
debs:
  - name: ansible
  - name: git
  - name: make
  - name: curl
  - name: jq
  - name: ssh
  - name: sshpass
  - name: iptables
  # Required by aether-onramp's 5gc router role; installed up-front so the
  # role's `apt: name=iptables-persistent` task is a no-op in airgap mode.
  - name: iptables-persistent
  # Required by the kubernetes.core ansible collection (helm, k8s,
  # k8s_info). Not a transitive dependency of ansible on Ubuntu, so
  # fresh hosts fail the first kubernetes.core call without this.
  # Upstream onramp's 5gc core role does not install this itself yet
  # (pending opennetworkinglab/aether-onramp#183).
  - name: python3-kubernetes

rke2:
  version: "v1.33.1+rke2r1"
  # sd-core needs multus (NetworkAttachmentDefinition CRD) alongside
  # canal (default pod network). all-in-one ships only canal, so use
  # core+variant with both variants to pull in multus images.
  variants: [canal, multus]
  image_mode: core+variant
  # source: https://github.com/rancher/rke2/releases/download
  #   ↑ optional override; defaults to GitHub releases

helm:
  version: "v3.17.3"

aether_ops:
  version: "v0.1.48"
  source: ./artifacts/aether-ops_0.1.48_linux_amd64.tar.gz  # local pre-built binary
  # ref: "main"           # build from source at this git ref (mutually exclusive with source)
  # repo: aether-gui/aether-ops
  # frontend_ref: ""      # override frontend submodule (source build only)

  # --- onramp user (Ansible SSH target) -----------------------------------
  # The onramp user is the OS identity aether-onramp's Ansible playbooks
  # SSH into. It is distinct from the daemon service account "aether-ops"
  # (which runs aether-ops itself and has no login shell). Default: aether.
  # onramp_user: aether

  # --- onramp password ---------------------------------------------------
  # DO NOT COMMIT onramp_password in a tracked spec. Prefer a runtime
  # source. The installer resolves the password in this order:
  #
  #   1. --onramp-password <value>         (CLI flag on `install`)
  #   2. AETHER_ONRAMP_PASSWORD            (environment variable)
  #   3. aether_ops.onramp_password        (this spec field)
  #   4. random 24-char string, logged to stderr at end of install
  #
  # A spec-level password is still honoured so gitignored local test
  # specs (e.g. specs/.scratch-*.yaml, which are covered by specs/.* in
  # .gitignore) can pin a known value. Checked-in specs should leave it
  # unset and rely on the CLI flag or env var.
  # onramp_password: "set-via-runtime"

# aether-onramp is the Ansible toolchain the aether-ops service invokes
# to deploy 5G workloads. The builder clones it at build time (pinning
# the resolved commit SHA in the manifest) and the launcher extracts it
# to /var/lib/aether-ops/aether-onramp on install. Post-clone patches
# applied by the builder (see internal/builder/onramp.go) adapt upstream
# defaults to the bundled-deployment model — notably flipping
# `airgapped.enabled: true` so `apt: update_cache` calls are gated off.
onramp:
  repo: https://github.com/opennetworkinglab/aether-onramp.git
  # Pinned to a specific upstream commit for reproducibility; bump
  # after reviewing upstream changes. HEAD of main at time of pin.
  ref: befeb8771706cd8c7e241acddf95a4a16486b4e5
  recurse_submodules: false

# Helm chart repositories to bundle. Each entry is cloned to
# /var/lib/aether-ops/helm-charts/<name> on the target host.
helm_charts:
  - name: sdcore-helm-charts
    repo: https://github.com/omec-project/sdcore-helm-charts.git
    ref: main

# Container images to pre-pull and stage for RKE2's airgap image loader.
# When auto_extract is true, the builder scans the cloned helm charts for
# image references and unions them with `extra`. When false, only `list`
# is used and it must be the complete set of images needed.
images:
  auto_extract: true
  # list: []             # used when auto_extract is false — must be complete
  # extra:               # standalone images added to the auto-extracted set
  exclude:
    # Legacy Docker v1 manifest; go-containerregistry cannot pull these.
    # Dependent services should be pointed at a newer image, or this entry
    # should be pulled out-of-band.
    - quay.io/stackanetes/kubernetes-entrypoint:v0.3.1

templates_dir: ./templates
