# Dropped by aether-ops-bootstrap
# Enables SSH password authentication for the onramp deployment user only.
# sshd uses first-match-wins: this drop-in (01-) takes effect before
# any higher-numbered configs or the main sshd_config.
# The user name is rendered from aether_ops.onramp_user in bundle.yaml.
Match User {{.OnrampUser}}
    PasswordAuthentication yes
