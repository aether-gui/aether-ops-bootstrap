# Kernel tunables required by sd-core under load.
#
# Mirrors aether-onramp's k8s/roles/rke2/tasks/install.yml lines 4–29,
# which apply these on master_nodes before rke2-server starts. Bootstrap
# short-circuits that role, so without this drop-in sd-core pods can fail
# with "too many open files" (file-max) or "no space left on device"
# (inotify watch/instance exhaustion).
fs.file-max = 2097152
fs.inotify.max_user_watches = 524288
fs.inotify.max_user_instances = 512
