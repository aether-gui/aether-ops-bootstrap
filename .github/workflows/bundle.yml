name: Bundle

on:
  push:
    tags: ["v*"]

jobs:
  build-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build bundle
        run: go run ./cmd/build-bundle --spec bundle.yaml
