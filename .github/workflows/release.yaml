name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  security-events: write

jobs:
  release:
    name: Release
    runs-on: [self-hosted, bundle-dist]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare bundle spec for CI
        run: |
          # Remove the local source path so the builder downloads the
          # aether-ops release from GitHub instead.
          sed -i '/^\s*source:.*artifacts\//d' bundle.yaml

      - name: Build bundle
        run: go run ./cmd/build-bundle --spec bundle.yaml --output dist/bundle.tar.zst

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Locate launcher binary
        id: launcher
        run: |
          binary="$(find dist -maxdepth 3 -type f -name 'aether-ops-bootstrap' -perm -u+x | head -n1)"
          if [ -z "$binary" ]; then
            echo "launcher binary not found under dist/" >&2
            exit 1
          fi
          echo "path=$binary" >> "$GITHUB_OUTPUT"

      - name: Generate launcher SBOM
        run: |
          syft "${{ steps.launcher.outputs.path }}" \
            -o spdx-json=dist/sbom-aether-ops-bootstrap-${{ github.ref_name }}.spdx.json

      - name: Generate bundle SBOM
        run: |
          syft dist/bundle.tar.zst \
            -o spdx-json=dist/sbom-bundle-${{ github.ref_name }}.spdx.json

      - name: Scan launcher SBOM with Grype
        run: |
          set -euo pipefail
          grype -q sbom:dist/sbom-aether-ops-bootstrap-${{ github.ref_name }}.spdx.json \
            --fail-on never -o sarif > dist/grype-launcher.sarif
          grype -q sbom:dist/sbom-aether-ops-bootstrap-${{ github.ref_name }}.spdx.json \
            --fail-on never -o json  > dist/grype-launcher.json

      - name: Scan bundle SBOM with Grype
        run: |
          set -euo pipefail
          grype -q sbom:dist/sbom-bundle-${{ github.ref_name }}.spdx.json \
            --fail-on never -o sarif > dist/grype-bundle.sarif
          grype -q sbom:dist/sbom-bundle-${{ github.ref_name }}.spdx.json \
            --fail-on never -o json  > dist/grype-bundle.json

      - name: Upload launcher SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: dist/grype-launcher.sarif
          category: launcher-release

      - name: Upload bundle SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: dist/grype-bundle.sarif
          category: bundle-release

      - name: Upload bundle and scan artifacts to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            dist/bundle.tar.zst \
            dist/bundle.tar.zst.sha256 \
            dist/sbom-aether-ops-bootstrap-${{ github.ref_name }}.spdx.json \
            dist/sbom-bundle-${{ github.ref_name }}.spdx.json \
            dist/grype-launcher.json \
            dist/grype-bundle.json
