name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: [self-hosted, bundle-dist]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare bundle spec for CI
        run: |
          # Remove the local source path so the builder downloads the
          # aether-ops release from GitHub instead.
          sed -i '/^\s*source:.*artifacts\//d' bundle.yaml

      - name: Build bundle
        run: go run ./cmd/build-bundle --spec bundle.yaml --output dist/bundle.tar.zst

      - name: Upload bundle to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            dist/bundle.tar.zst \
            dist/bundle.tar.zst.sha256
