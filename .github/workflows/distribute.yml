# Distribute pipeline.
#
# Cuts a new bundle + bootstrap + patch-tool distribution: rebuilds
# every artifact against the current spec, rotates site/releases.yaml
# in place (demotes the prior current to external, inserts a new
# current entry at the top), publishes the rendered site to
# /var/www/tools.jointpathfinding.com/aether-ops-bootstrap on the www
# container, commits the release-notes update on a feature branch,
# and opens a PR against `dev` for human review of the notes before
# merging.
#
# Companion to the `Release` workflow (release.yaml) which handles
# launcher GitHub Release + SBOM/Grype scans. The two workflows share
# the same self-hosted runner via the `bundle-dist` label.
#
# Runs on a self-hosted runner registered inside the LXD `www`
# container (label `bundle-dist`) so the bundle's .deb staging + the
# ~3.4 GB upload are local filesystem operations instead of multi-
# minute LXD HTTPS API transfers. See
# .claude/procedures/setup-www-runner.md for one-time runner
# registration.
#
# Triggers:
#   - workflow_dispatch (manual): operator picks the version + commit
#     message. Use this when the spec change has already merged to
#     `main` and you want to cut artifacts against it without tagging.
#   - push of tags matching v<YYYY>.<MM>.<DD>.<N>: the canonical
#     release trigger. `git tag v2026.05.12.1 && git push --tags` cuts
#     a release whose bundle_version is the tag's calver portion (the
#     leading `v` is stripped). The tag itself becomes the immutable
#     pointer to the source revision the bundle was built from.

name: Distribute

on:
  workflow_dispatch:
    inputs:
      bundle_version:
        description: "Bundle version (YYYY.MM.DD.N). Defaults to today's UTC date with N=1."
        required: false
      release_id:
        description: 'Human-readable slug for the release entry id (default: release-<version>).'
        required: false
  push:
    tags:
      # Calver tags (e.g. v2026.05.12.1) trigger the full release
      # pipeline. Restrict the regex tightly so tags like `v0.2.0`
      # (used for the aether-ops daemon, which we vendor separately)
      # never fire this workflow against the wrong source of truth.
      - 'v[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9].*'

jobs:
  distribute:
    name: build + publish + open PR
    runs-on: [self-hosted, bundle-dist]
    permissions:
      contents: write
      pull-requests: write
    env:
      WWW_ROOT: /var/www/tools.jointpathfinding.com/aether-ops-bootstrap
    steps:
      - name: Checkout (full history for git rev-parse + tag context)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Resolve target bundle version
        id: version
        run: |
          set -euo pipefail
          # Resolution priority:
          #   1. workflow_dispatch input bundle_version (operator override)
          #   2. tag-push: the calver portion of the tag (vYYYY.MM.DD.N → YYYY.MM.DD.N)
          #   3. fallback: today's UTC date with N=1
          V="${{ inputs.bundle_version }}"
          if [ -z "$V" ] && [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            # GITHUB_REF_NAME is the tag name without refs/tags/.
            V="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "$V" ]; then
            V="$(date -u +%Y.%m.%d).1"
          fi
          echo "BUNDLE_VERSION=$V" >> "$GITHUB_ENV"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          # The release entry's `id:` slug, free-form. Falls back to
          # `release-<version>` if the caller didn't supply one.
          ID="${{ inputs.release_id }}"
          [ -z "$ID" ] && ID="release-$V"
          echo "RELEASE_ID=$ID" >> "$GITHUB_ENV"

      - name: Pin bundle_version in specs/bundle.yaml
        run: |
          set -euo pipefail
          # The spec already validates schema_version, so we only
          # touch bundle_version. Use a literal pattern match so the
          # regex doesn't drift.
          sed -i -E 's/^bundle_version: ".*"$/bundle_version: "'"$BUNDLE_VERSION"'"/' specs/bundle.yaml
          grep -q "bundle_version: \"$BUNDLE_VERSION\"" specs/bundle.yaml

      - name: Build CLI tools (bootstrap, build-bundle, patch-bundle, build-release-site)
        run: make build build-bundle build-patch-bundle build-release-site

      - name: Capture prior current-release SHAs from live metadata.json
        id: prior
        run: |
          set -euo pipefail
          META="$WWW_ROOT/metadata.json"
          if [ ! -f "$META" ]; then
            echo "ERROR: live metadata.json not found at $META" >&2
            exit 1
          fi
          PB=$(jq -r '.releases[] | select(.current==true) | .bootstrap.sha256' "$META")
          PD=$(jq -r '.releases[] | select(.current==true) | .bundle.sha256' "$META")
          PP=$(jq -r '.releases[] | select(.current==true) | .patch_tool.sha256' "$META")
          for v in "$PB" "$PD" "$PP"; do
            if [ -z "$v" ] || [ "$v" = "null" ]; then
              echo "ERROR: prior current-release SHA missing in metadata.json" >&2
              exit 1
            fi
          done
          echo "prior_bootstrap_sha=$PB" >> "$GITHUB_OUTPUT"
          echo "prior_bundle_sha=$PD" >> "$GITHUB_OUTPUT"
          echo "prior_patch_tool_sha=$PP" >> "$GITHUB_OUTPUT"

          # Outgoing release's supply-chain sidecars: derive one
          # --prior-security-sha flag per security_artifacts entry
          # found in metadata.json. Earlier releases (cut before the
          # SBOM/Grype/VEX pipeline existed) carry no security_artifacts
          # block, in which case this expression yields an empty string
          # and downstream demotion is a no-op for that release.
          PRIOR_SEC_FLAGS=$(jq -r '
            .releases[]
            | select(.current==true)
            | to_entries[]
            | select(.value | type=="object" and has("security_artifacts"))
            | .key as $parent
            | .value.security_artifacts[]
            | "--prior-security-sha=\($parent):\(.filename)=\(.sha256)"
          ' "$META" | paste -sd ' ' -)
          # Surface as a multi-line step output so the render step can
          # consume the flag list verbatim. Empty value is fine.
          {
            echo "prior_security_flags<<__PSF__"
            echo "$PRIOR_SEC_FLAGS"
            echo "__PSF__"
          } >> "$GITHUB_OUTPUT"

      - name: Build the offline bundle
        run: ./dist/build-bundle --spec specs/bundle.yaml --output dist/bundle.tar.zst

      - name: Compute build commit
        id: commit
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install Syft
        run: |
          set -euo pipefail
          # Idempotent: install.sh -b writes the binary into
          # /usr/local/bin and overwrites any prior version.
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Install Grype
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Generate SBOMs (launcher + bundle)
        env:
          SYFT_SOURCE_NAME: aether-ops-bootstrap
          SYFT_SOURCE_VERSION: ${{ env.BUNDLE_VERSION }}
        run: |
          set -euo pipefail
          # Stable, version-agnostic filenames in dist/ so the promote
          # logic in build-release-site can reference them as
          # ../dist/sbom-bootstrap.spdx.json etc. The published copies
          # under the site tree get the version-aware names assigned by
          # security_artifacts.filename in releases.yaml.
          syft dist/aether-ops-bootstrap \
            -o spdx-json=dist/sbom-bootstrap.spdx.json
          syft dist/bundle.tar.zst \
            -o spdx-json=dist/sbom-bundle.spdx.json

      - name: Scan SBOMs with Grype (using OpenVEX suppressions)
        env:
          GRYPE_CHECK_FOR_APP_UPDATE: "false"
        run: |
          set -euo pipefail
          # --vex consumes security/vex/openvex.json so any CVE the
          # maintainers have marked not_affected / fixed drops out of
          # the output. JSON is the canonical machine-readable scan
          # consumers ingest; the .txt copy is a human-readable
          # companion (Grype writes plain text — no ANSI codes — when
          # output is a file). Both are published per release under
          # the Supply-chain artifacts section.
          grype sbom:dist/sbom-bootstrap.spdx.json \
            --vex security/vex/openvex.json \
            -o json --file dist/grype-bootstrap.json
          grype sbom:dist/sbom-bootstrap.spdx.json \
            --vex security/vex/openvex.json \
            -o table --file dist/grype-bootstrap.txt
          cat dist/grype-bootstrap.txt
          grype sbom:dist/sbom-bundle.spdx.json \
            --vex security/vex/openvex.json \
            -o json --file dist/grype-bundle.json
          grype sbom:dist/sbom-bundle.spdx.json \
            --vex security/vex/openvex.json \
            -o table --file dist/grype-bundle.txt
          cat dist/grype-bundle.txt

      - name: Per-image SBOM + Grype scans
        env:
          GRYPE_CHECK_FOR_APP_UPDATE: "false"
        run: |
          set -euo pipefail
          # The outer-bundle syft scan can't see inside `docker save`
          # tarballs, so per-image NF visibility (UPF, AMF, SMF, etc.)
          # would otherwise be a blind spot. Extract images/ from the
          # finished bundle, run syft + grype on each tarball, and ship
          # the results as `image-sboms.tar.gz` + `image-grypes.tar.gz`.
          # `docker-archive:` is the correct syft scheme for the
          # docker-save format `crane.Save` writes inside build-bundle.
          mkdir -p dist/image-sboms dist/image-grypes
          rm -rf /tmp/image-extract && mkdir -p /tmp/image-extract
          tar --use-compress-program=zstd -xf dist/bundle.tar.zst \
            -C /tmp/image-extract images/
          for img in /tmp/image-extract/images/*.tar; do
            name=$(basename "$img" .tar)
            syft "docker-archive:$img" --quiet \
              -o spdx-json="dist/image-sboms/${name}.spdx.json"
            grype "sbom:dist/image-sboms/${name}.spdx.json" \
              --vex security/vex/openvex.json \
              -o json --file "dist/image-grypes/${name}.grype.json"
            grype "sbom:dist/image-sboms/${name}.spdx.json" \
              --vex security/vex/openvex.json \
              -o table --file "dist/image-grypes/${name}.grype.txt"
          done
          ( cd dist/image-sboms  && tar czf ../image-sboms.tar.gz  *.spdx.json )
          ( cd dist/image-grypes && tar czf ../image-grypes.tar.gz *.grype.json *.grype.txt )
          rm -rf /tmp/image-extract
          ls -lh dist/image-sboms.tar.gz dist/image-grypes.tar.gz

      - name: Rotate site/releases.yaml + render site
        id: render
        env:
          PRIOR_SECURITY_FLAGS: ${{ steps.prior.outputs.prior_security_flags }}
        run: |
          set -euo pipefail
          # `--prune-keep=2` retains the new current + 2 most recent
          # external releases in releases.yaml and prints the list of
          # versions it dropped on stdout. The downstream cleanup step
          # consumes that list to remove the matching artifact
          # directories under $WWW_ROOT.
          # PRIOR_SECURITY_FLAGS is the space-separated
          # --prior-security-sha=… list captured from the outgoing
          # release's security_artifacts entries (empty on the first
          # rotation after this feature lands). Routed through env
          # rather than expression interpolation so the shell sees a
          # plain word list, not interpolated text — same hardening
          # GitHub recommends for any captured-output expansion.
          # shellcheck disable=SC2086  # intentional word splitting on flag list
          ./dist/build-release-site \
            --metadata site/releases.yaml \
            --output dist/release-site \
            --spec specs/bundle.yaml \
            --promote-current "$BUNDLE_VERSION" \
            --promote-id "$RELEASE_ID" \
            --build-commit "${{ steps.commit.outputs.sha }}" \
            --prior-bootstrap-sha "${{ steps.prior.outputs.prior_bootstrap_sha }}" \
            --prior-bundle-sha "${{ steps.prior.outputs.prior_bundle_sha }}" \
            --prior-patch-tool-sha "${{ steps.prior.outputs.prior_patch_tool_sha }}" \
            $PRIOR_SECURITY_FLAGS \
            --prune-keep 2 \
            > pruned-versions.txt
          # Surface the pruned list as a step output for the cleanup
          # step. GitHub Actions step outputs encode multi-line values
          # via the `delimiter` form.
          {
            echo "versions<<__PRUNED__"
            cat pruned-versions.txt
            echo "__PRUNED__"
          } >> "$GITHUB_OUTPUT"

      - name: Publish to $WWW_ROOT
        run: |
          set -euo pipefail
          # The runner runs as `aether-runner`, not root. A narrow
          # sudoers drop-in (see docs/release/setup-www-runner.md)
          # allows exactly these two argv shapes:
          #   sudo install -d -m 755 -o www-data -g www-data <path>...
          #   sudo rsync -a --chown=www-data:www-data <src> <dst>
          # Anything else needs ad-hoc operator action.
          sudo install -d -m 755 -o www-data -g www-data \
            "$WWW_ROOT/bootstrap/$BUNDLE_VERSION" \
            "$WWW_ROOT/bundles/$BUNDLE_VERSION" \
            "$WWW_ROOT/tools/$BUNDLE_VERSION"
          # Top-level files (index.html, metadata.json, releases/) +
          # per-version artifact dirs. `rsync -a` preserves modes and
          # `--chown` flips ownership to www-data:www-data so nginx
          # can read.
          sudo rsync -a --chown=www-data:www-data dist/release-site/ "$WWW_ROOT/"

      - name: Verify published artifacts
        run: |
          set -euo pipefail
          cd "$WWW_ROOT/bootstrap/$BUNDLE_VERSION"   && sha256sum -c aether-ops-bootstrap.sha256
          cd "$WWW_ROOT/bundles/$BUNDLE_VERSION"     && sha256sum -c bundle.tar.zst.sha256
          cd "$WWW_ROOT/tools/$BUNDLE_VERSION"       && sha256sum -c patch-bundle.sha256
          # Supply-chain sidecars (SBOM / Grype / VEX). Each entry the
          # renderer staged has a matching .sha256 sidecar written next
          # to it, so the same sha256sum -c pattern verifies integrity
          # without us having to enumerate filenames here.
          for d in "$WWW_ROOT/bootstrap/$BUNDLE_VERSION" "$WWW_ROOT/bundles/$BUNDLE_VERSION"; do
            cd "$d"
            for sc in *.sha256; do
              # Skip the primary artifact sidecars already checked above.
              case "$sc" in
                aether-ops-bootstrap.sha256|bundle.tar.zst.sha256) continue ;;
              esac
              sha256sum -c "$sc"
            done
          done
          CURRENT=$(jq -r '.releases[] | select(.current==true) | .bundle.version' "$WWW_ROOT/metadata.json")
          if [ "$CURRENT" != "$BUNDLE_VERSION" ]; then
            echo "ERROR: live metadata.json reports current=$CURRENT, expected $BUNDLE_VERSION" >&2
            exit 1
          fi

      - name: Prune retired release artifact directories
        # The retention policy keeps current + 2 prior releases (set
        # by --prune-keep=2 above). Anything no longer referenced in
        # metadata.json is a candidate for deletion. We never delete
        # by version list received from the step output alone — we
        # cross-check against metadata.json so a typo or partial run
        # can't unintentionally remove a still-referenced directory.
        run: |
          set -euo pipefail
          KEPT=$(jq -r '.releases[] | (.bootstrap.version, .bundle.version, .patch_tool.version)' "$WWW_ROOT/metadata.json" | sort -u)
          deleted=0
          for kind in bootstrap bundles tools; do
            base="$WWW_ROOT/$kind"
            [ -d "$base" ] || continue
            for dir in "$base"/*; do
              [ -d "$dir" ] || continue
              v=$(basename "$dir")
              if echo "$KEPT" | grep -qFx "$v"; then
                continue
              fi
              echo "Removing $dir"
              sudo rm -rf -- "$dir"
              deleted=$((deleted + 1))
            done
          done
          echo "Pruned $deleted retired version directories."

      - name: Commit + push release branch
        id: branch
        run: |
          set -euo pipefail
          BRANCH="feature/release-site-$BUNDLE_VERSION"
          git config user.name  "aether-ops-release-bot"
          git config user.email "aether-ops-release-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add specs/bundle.yaml site/releases.yaml
          git commit -m "site: publish $BUNDLE_VERSION release"
          git push -u origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Open release PR (feature → dev)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh pr create \
            --base dev \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "Publish $BUNDLE_VERSION release notes" \
            --body "$(cat <<EOF
          ## Summary

          Automated release publish for \`$BUNDLE_VERSION\`. Artifacts are already live at
          \`https://tools.jointpathfinding.com/aether-ops-bootstrap/\` — this PR just keeps
          the repo's \`site/releases.yaml\` and the live site in lock-step.

          The placeholder \`TODO\` bullets in the new release entry's \`release_notes\`
          lists need to be filled in (along with a one-line \`release_summary\` headline
          on each artifact) before merging.

          ## Test plan

          - [x] Workflow built every artifact and verified \`sha256sum -c\` on the www container.
          - [x] \`metadata.json\` reports \`$BUNDLE_VERSION\` as the current release.
          - [ ] Fill in \`release_summary\` and \`release_notes\` on bootstrap, bundle, and patch_tool.
          - [ ] Merge through dev → main per the usual merge-train workflow.
          EOF
          )"
