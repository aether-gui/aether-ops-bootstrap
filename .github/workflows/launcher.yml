name: Launcher

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.22"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Test
        run: go test -race -cover ./...

      - name: Build
        run: make build

  vuln-scan:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Scan source with Grype
        env:
          GRYPE_CHECK_FOR_APP_UPDATE: "false"
        run: |
          set -euxo pipefail
          grype version
          grype dir:. -o sarif --file grype-source.sarif
          grype dir:. -o json  --file grype-source.json
          ls -la grype-source.sarif grype-source.json
          echo "---SARIF head---"
          head -c 500 grype-source.sarif || true
          echo
          test -s grype-source.sarif

      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: grype-source.sarif
          category: source

      - name: Upload JSON report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grype-source-report
          path: grype-source.json
