name: Launcher

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.22"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Test
        run: go test -race -cover ./...

      - name: Build
        run: make build

  vuln-scan:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Scan source with Grype
        env:
          GRYPE_CHECK_FOR_APP_UPDATE: "false"
          SYFT_SOURCE_NAME: aether-ops-bootstrap
          SYFT_SOURCE_VERSION: ${{ github.sha }}
        run: |
          set -euo pipefail
          grype dir:. -o table
          grype dir:. -o json --file grype-source.json

      - name: Upload vulnerability report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grype-source-report
          path: grype-source.json
